model_name: 'clustview'
#dataset: 'ScanObjectNN'
dataset: 'ModelNet40'
dataset_dir: '../../Dataset/'
seed: 9344
test_batch_size: 32
gpu: 0
num_repeat: 200
num_vote: 10
trans_open: True
input_dim: 3
#num_classes: 15
num_classes: 40

task: 'classification'

train_gpu: [0]
num_points: 1024
down_ratio: [1, 2, 4, 8]
patch_size: 16
embed_dim: [3, 24, 48, 96, 192]
local_size: 16
num_heads: 4
mlp_ratio: 2
depth: [1, 1, 4, 2]
proj_dim: [24, 48, 96, 192]

dropout: 0.5
drop_path_rate: 0.05
warm_up_epoch: 30

# RSMix arguments
rsmix_prob: 0.5 
beta: 1.0 
rsmix_nsample: 512

hydra:
  run:
    dir: output/${dataset}/${model_name}/vote_cls

  sweep:
    dir: output/${dataset}/${model_name}/vote_cls