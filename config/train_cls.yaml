defaults:
  - _self_
  - data: modelnet40

task: 'classification'
eval: False
flops_profiler: True

use_sgd: True
lr: 1e-3
momentum: 0.9
dropout: 0.5
scheduler: 'cos'
warm_up: True

# ModelNet40
train_gpu: [0]
num_points: 1024
down_ratio: [1, 2, 4, 8]
patch_size: 16
embed_dim: [3, 24, 48, 96, 192]
local_size: 16
num_heads: 4
mlp_ratio: 2
depth: [1, 1, 4, 2]
proj_dim: [24, 48, 96, 192]

# ScanObjectNN
#train_gpu: [0]
#num_points: 1024
#down_ratio: [1, 2, 4, 8, 16]
#patch_size: 16
#embed_dim: [3, 64, 128, 256, 384, 512]
#local_size: 16
#num_heads: 4
#mlp_ratio: 2
#depth: [1, 1, 1, 1, 1]
#proj_dim: [128, 256, 384, 512]

# RSMix arguments
rsmix_prob: 0.5 
beta: 1.0 
rsmix_nsample: 512

# We support wandb for online results collection, please check their documentation for details: https://docs.wandb.ai/
wandb:
  use_wandb: True
  project: ${model_name}-${dataset}   
  name: ${wandb_name}

hydra:
  run:
    dir: output/${dataset}/${model_name}/${wandb_name}

  sweep:
    dir: output/${dataset}/${model_name}/${wandb_name}
